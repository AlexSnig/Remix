<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Sapphire Blue Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="#0057B7" />
  
  <!-- Outer Gold Border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#FFD700" stroke-width="12" />

  <!-- Ukrainian Trident (Tryzub) drawn professionally -->
  <!-- Gold path (#FFD700) -->
  <g transform="translate(0, -10)" stroke="#FFD700" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Left Wing -->
    <path d="M 180,260 C 140,290 140,380 180,410 C 210,430 240,430 256,410 C 256,410 240,300 240,220 L 240,160 L 200,195 M 180,260 L 200,195" />
    
    <!-- Right Wing -->
    <path d="M 332,260 C 372,290 372,380 332,410 C 302,430 272,430 256,410 C 256,410 272,300 272,220 L 272,160 L 312,195 M 332,260 L 312,195" />
    
    <!-- Central Spear / Prong -->
    <path d="M 256,120 L 256,360" stroke-width="18" />
    <!-- Center spear Tip -->
    <path d="M 235,160 L 256,120 L 277,160 Z" fill="#FFD700" stroke-width="4" />
    
    <!-- Cross/Base Connection -->
    <path d="M 210,410 L 256,425 L 302,410" stroke-width="16" />
    <path d="M 256,425 L 256,450" stroke-width="16" />
  </g>

  <!-- Eye in the middle of the trident (symbol of vigil, security, sensor protection) -->
  <g transform="translate(0, 5)">
    <!-- Eye outer outline -->
    <path d="M 196,290 C 220,250 292,250 316,290 C 292,330 220,330 196,290 Z" fill="#0057B7" stroke="#FFD700" stroke-width="8" stroke-linejoin="round" />
    <!-- Pupil / Iris -->
    <circle cx="256" cy="290" r="22" fill="#FFD700" stroke="#0057B7" stroke-width="3" />
    <!-- White glare highlight representing camera lens shine -->
    <circle cx="262" cy="284" r="7" fill="#FFFFFF" />
  </g>
</svg>
